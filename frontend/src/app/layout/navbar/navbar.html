<nav class="nav">

  <div class="logo">
    <img src="/assets/velox-logo.png" alt="Velox" width="32" height="32"
      style="border-radius:6px; margin-right:8px; object-fit:cover;" />
    <span class="logo-text">Velox</span>
  </div>

  <div class="links">

    <!-- LOGGED OUT -->
    <ng-container *ngIf="!isLogged; else loggedUser">
      <a routerLink="/login" class="btn ghost">Login</a>
      <a routerLink="/register" class="btn primary">Register</a>
    </ng-container>

    <!-- LOGGED IN -->
    <ng-template #loggedUser>
      <div class="user-dropdown-container">

        <button class="user-trigger" (click)="toggleDropdown($event)" [class.active]="isDropdownOpen">
          <div class="user-avatar">
            {{ getUserName().charAt(0).toUpperCase() }}
          </div>
          <span class="user-name">{{ getUserName() }}</span>
          <svg class="chevron" [class.open]="isDropdownOpen" viewBox="0 0 24 24" width="16" height="16"
            stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>

        <div class="dropdown-menu" *ngIf="isDropdownOpen">
          <div class="dropdown-header">
            <span class="greeting">Signed in as</span>
            <span class="full-name">{{ getUserName() }}</span>
          </div>

          <div class="dropdown-divider"></div>

          <a class="dropdown-item" routerLink="/settings" [queryParams]="{tab: 'profile'}" (click)="closeDropdown()">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Profile
          </a>

          <a class="dropdown-item" routerLink="/settings" [queryParams]="{tab: 'notifications'}"
            (click)="closeDropdown()">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
              </path>
            </svg>
            Settings
          </a>

          <div class="dropdown-divider"></div>

          <button class="dropdown-item logout-btn" (click)="logout()">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Logout
          </button>
        </div>

      </div>
    </ng-template>

  </div>

</nav>
