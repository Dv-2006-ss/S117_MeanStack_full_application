<div class="dashboard-hero fade-in">
  <div class="hero-content">
    <h1 class="slogan">Accelerate growth with intelligent automation.</h1>
    <p class="sub-slogan">Reach your audience across email and SMS effortlessly. Design campaigns, automate sequences,
      and watch your business thrive.</p>

    <div class="hero-actions">
      <a (click)="onBuildClick()" style="cursor: pointer;" class="btn-build">
        Let's build <span class="arrow">→</span>
      </a>
    </div>
  </div>

  <div class="hero-visual">
    <div class="img-wrapper main-img">
      <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80&w=800"
        alt="Marketing Analytics">
      <div class="glass-overlay"></div>
    </div>
    <div class="img-wrapper floating-img">
      <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&q=80&w=400"
        alt="Data Visualization">
    </div>
    <div class="glow-bg"></div>
  </div>
</div>
