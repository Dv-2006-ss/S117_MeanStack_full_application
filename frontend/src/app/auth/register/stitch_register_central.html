<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sleek SaaS Auth Card</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5b13ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0a0514",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(22, 16, 34, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(91, 19, 236, 0.2);
        }
        .light-leak {
            background: radial-gradient(circle at center, rgba(91, 19, 236, 0.15) 0%, rgba(91, 19, 236, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden">
<!-- Background Decor -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="light-leak absolute -top-24 -left-24 w-96 h-96 rounded-full blur-3xl"></div>
<div class="light-leak absolute top-1/2 -right-48 w-[500px] h-[500px] rounded-full blur-3xl"></div>
<div class="light-leak absolute -bottom-32 left-1/4 w-80 h-80 rounded-full blur-3xl"></div>
</div>
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-6">
<!-- Logo/Header Area -->
<div class="mb-8 flex flex-col items-center">
<div class="bg-primary/20 p-3 rounded-xl mb-4 border border-primary/30">
<span class="material-symbols-outlined text-primary text-3xl">
                    auto_awesome
                </span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold tracking-tight">Nexus Analytics</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Enterprise Marketing Platform</p>
</div>
<!-- Glassmorphism Card -->
<div class="glass-card w-full max-w-[400px] rounded-xl p-8 shadow-2xl relative overflow-hidden">
<!-- Active Tab Indicator -->
<div class="flex mb-8 border-b border-primary/10">
<button class="flex-1 pb-4 text-sm font-semibold text-primary border-b-2 border-primary">
                    Login
                </button>
<button class="flex-1 pb-4 text-sm font-semibold text-slate-500 dark:text-slate-400 hover:text-slate-300 transition-colors">
                    Register
                </button>
</div>
<!-- Form Content -->
<div class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 text-xl group-focus-within:text-primary transition-colors">
                                mail
                            </span>
</div>
<input class="w-full bg-background-dark/50 border border-primary/20 text-slate-100 text-sm rounded-lg pl-11 pr-4 py-3.5 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-600" placeholder="name@enterprise.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
<a class="text-xs font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 text-xl group-focus-within:text-primary transition-colors">
                                lock
                            </span>
</div>
<input class="w-full bg-background-dark/50 border border-primary/20 text-slate-100 text-sm rounded-lg pl-11 pr-12 py-3.5 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-600" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-500 hover:text-slate-300">
<span class="material-symbols-outlined text-xl" data-icon="visibility">
                                visibility
                            </span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center px-1">
<input class="w-4 h-4 rounded border-primary/30 bg-background-dark text-primary focus:ring-primary focus:ring-offset-background-dark" id="remember" type="checkbox"/>
<label class="ml-2 text-sm text-slate-400 select-none" for="remember">Keep me signed in</label>
</div>
<!-- Primary Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-[0_0_20px_rgba(91,19,236,0.3)] transition-all flex items-center justify-center gap-2 group">
<span>Sign In</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">
                        arrow_forward
                    </span>
</button>
<!-- Divider -->
<div class="relative py-2">
<div class="absolute inset-0 flex items-center px-2">
<div class="w-full border-t border-primary/10"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-background-dark/80 px-4 text-slate-500">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 rounded-lg border border-primary/10 bg-primary/5 hover:bg-primary/10 transition-colors text-slate-300 text-sm font-medium">
<img alt="" class="w-5 h-5 grayscale opacity-70" data-alt="Google monochromatic icon logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCUnpd3dwld9YnXxqPEGXNq3tHWtkAyQkmZRv_l4P_U9i43PpuW4Ap6i7g_C-h-cl1r77ff2dVkGxSGTSZ2P2O7LfqXTuGxATvB3VLHbmK_9HOHhXqtrT8lgor4aUVPN_DckzS6v7OKK5uBywEWObPEDOQXu_WzrBHUn8CfaQJ6PPQb3-zn8bNGlP_zUhLQPrnoRafEi7b2OShC9PDGcZ-y68jVPzz5Rkc4RdOmalILjipguUGVuYliJjQaElZZLOZIkHYVrIpCBzzt"/>
                        Google
                    </button>
<button class="flex items-center justify-center gap-2 py-3 rounded-lg border border-primary/10 bg-primary/5 hover:bg-primary/10 transition-colors text-slate-300 text-sm font-medium">
<svg class="w-5 h-5 fill-slate-300" viewbox="0 0 24 24">
<path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"></path>
</svg>
                        GitHub
                    </button>
</div>
</div>
</div>
<!-- Footer -->
<div class="mt-8 flex gap-6 text-xs font-medium text-slate-500 uppercase tracking-widest">
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
<a class="hover:text-primary transition-colors" href="#">Terms</a>
<a class="hover:text-primary transition-colors" href="#">Support</a>
</div>
</div>
</body></html>
