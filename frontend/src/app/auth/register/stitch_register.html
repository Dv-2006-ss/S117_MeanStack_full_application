<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Marketing Platform - Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5b13ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#161022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(47, 35, 72, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(164, 146, 201, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 20px rgba(91, 19, 236, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-hidden max-w-[430px] mx-auto shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Background Accents -->
<div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-primary/20 rounded-full blur-[80px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-72 h-72 bg-primary/10 rounded-full blur-[100px]"></div>
<!-- Top Header Navigation -->
<div class="relative flex items-center p-6 justify-between z-10">
<button class="text-slate-900 dark:text-slate-100 p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white font-bold">M</div>
<h2 class="text-lg font-bold tracking-tight">MarketFlow</h2>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
<!-- Hero Section / Branding -->
<div class="px-6 pt-4 pb-8 z-10">
<h1 class="text-3xl font-bold mb-2">Join the revolution</h1>
<p class="text-slate-600 dark:text-slate-400">Scale your marketing automation with the power of AI and real-time data.</p>
</div>
<!-- Glassmorphism Auth Card -->
<div class="px-6 z-10 flex-1">
<div class="glass-card rounded-xl p-1 mb-8">
<!-- Tabs -->
<div class="flex mb-6">
<a class="flex-1 text-center py-3 text-slate-500 dark:text-slate-400 font-semibold border-b-2 border-transparent" href="#">Login</a>
<a class="flex-1 text-center py-3 text-primary font-semibold border-b-2 border-primary" href="#">Register</a>
</div>
<div class="p-4 space-y-5">
<!-- Full Name Field -->
<div class="flex flex-col gap-2">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="w-full pl-12 pr-4 h-14 bg-background-light dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-slate-100" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Business Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full pl-12 pr-4 h-14 bg-background-light dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-slate-100" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-12 pr-12 h-14 bg-background-light dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-slate-100" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl cursor-pointer">visibility</span>
</div>
</div>
<!-- Register Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-xl neon-glow transition-all active:scale-95 mt-4">
                        Create Account
                    </button>
<!-- Divider -->
<div class="flex items-center gap-4 my-6">
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-primary/20"></div>
<span class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase">Or continue with</span>
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-primary/20"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-12 bg-background-light dark:bg-background-dark/80 border border-slate-200 dark:border-primary/20 rounded-xl hover:bg-slate-100 dark:hover:bg-primary/10 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M12.48 10.92v3.28h7.84c-.24 1.84-.9 3.32-2.22 4.4-1.32 1.08-3.08 1.8-5.62 1.8-4.84 0-8.72-3.88-8.72-8.72s3.88-8.72 8.72-8.72c2.6 0 4.5 1.02 5.9 2.34l2.3-2.3c-2.1-1.94-4.84-3.14-8.2-3.14-6.68 0-12 5.32-12 12s5.32 12 12 12c3.58 0 6.3-1.18 8.4-3.4 2.14-2.14 3.02-5.22 3.02-8.1 0-.6-.04-1.18-.12-1.72h-11.3z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="flex items-center justify-center gap-2 h-12 bg-background-light dark:bg-background-dark/80 border border-slate-200 dark:border-primary/20 rounded-xl hover:bg-slate-100 dark:hover:bg-primary/10 transition-colors">
<svg class="w-5 h-5 dark:fill-white fill-black" viewbox="0 0 24 24">
<path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"></path>
</svg>
<span class="text-sm font-semibold">GitHub</span>
</button>
</div>
</div>
</div>
<p class="text-center text-xs text-slate-500 dark:text-slate-400 px-8">
                By creating an account, you agree to our <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
            </p>
</div>
<!-- Bottom Tab Bar Placeholder -->
<div class="mt-auto border-t border-slate-200 dark:border-primary/20 bg-background-light dark:bg-background-dark/90 px-6 py-4">
<div class="flex justify-around items-center">
<a class="text-slate-400 flex flex-col items-center" href="#">
<span class="material-symbols-outlined">home</span>
</a>
<a class="text-slate-400 flex flex-col items-center" href="#">
<span class="material-symbols-outlined">insights</span>
</a>
<a class="text-primary flex flex-col items-center" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">account_circle</span>
</a>
<a class="text-slate-400 flex flex-col items-center" href="#">
<span class="material-symbols-outlined">settings</span>
</a>
</div>
</div>
</div>
</body></html>
