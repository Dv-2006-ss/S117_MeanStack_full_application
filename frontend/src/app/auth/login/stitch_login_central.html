<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Premium SaaS Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5b13ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#161022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .glow-orb {
            filter: blur(80px);
            opacity: 0.4;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative overflow-hidden flex flex-col">
<!-- Ambient Background Orbs -->
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[50%] bg-primary glow-orb rounded-full -z-10"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[40%] bg-blue-600 glow-orb rounded-full -z-10"></div>
<!-- Top App Bar / Header -->
<div class="flex items-center p-6 justify-between z-10">
<div class="text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full bg-white/5 border border-white/10" data-icon="close">
<span class="material-symbols-outlined">close</span>
</div>
<div class="flex items-center gap-2">
<div class="size-6 bg-primary rounded-sm flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] text-white">bolt</span>
</div>
<h2 class="text-slate-100 text-sm font-semibold tracking-wider uppercase">Marketing Cloud</h2>
</div>
<div class="size-10"></div> <!-- Spacer for symmetry -->
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col justify-center px-6 pb-12 z-10">
<!-- Welcome Text -->
<div class="mb-8 text-center">
<h1 class="text-white text-4xl font-bold tracking-tight mb-2">Welcome Back</h1>
<p class="text-slate-400 text-base">Access your premium marketing dashboard</p>
</div>
<!-- Glassmorphism Login Card -->
<div class="glass-morphism rounded-xl overflow-hidden p-1">
<!-- Tabs -->
<div class="flex border-b border-white/10">
<button class="flex-1 py-4 text-sm font-semibold border-b-2 border-primary text-white bg-white/5">
                    Login
                </button>
<button class="flex-1 py-4 text-sm font-semibold border-b-2 border-transparent text-slate-400">
                    Create Account
                </button>
</div>
<!-- Form -->
<div class="p-6 space-y-5">
<!-- Full Name Field (Hidden for Login variant as requested) -->
<div class="hidden">
<label class="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Full Name</label>
<div class="relative">
<input class="w-full bg-background-dark/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-600" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Address Field -->
<div>
<label class="block text-xs font-medium text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-background-dark/50 border border-white/10 rounded-lg pl-11 pr-4 py-3 text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-600" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-1.5 ml-1">
<label class="block text-xs font-medium text-slate-400 uppercase tracking-widest">Password</label>
<a class="text-xs font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-background-dark/50 border border-white/10 rounded-lg pl-11 pr-4 py-3 text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-600" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action Button -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-[0_0_20px_rgba(91,19,236,0.3)] transition-all flex items-center justify-center gap-2">
                        Get Started
                        <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
<!-- Social Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-white/10"></div>
<span class="text-xs text-slate-500 font-medium">OR CONTINUE WITH</span>
<div class="h-[1px] flex-1 bg-white/10"></div>
</div>
<!-- Social Button -->
<button class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-medium py-3 rounded-lg transition-all flex items-center justify-center gap-3">
<div class="w-5 h-5 bg-center bg-contain bg-no-repeat" data-alt="Google logo icon for social login" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCGxHfh-whdTERIm4tm9AgIoyAIVHl0a7qhwwSxKGBNkn7zKMmuuL3KEH08D4LOvWfjYEUftbFdy3Vh_1DztRTDckuFA9U7NAQHUoqKRhL81y9JjXpm5EoZcHsiLnsSA8IdziaQdIqtZcjsuXxJtoanUYdM7vbBLXC4YAi3Sipkkc1V2kGId92V_pR5qqplPUXtyvtZEpEPtMck_cgy3pGZfg6l5KGhq5xNOLUyXB40kP0SU9BGY-aG0O5wxbsgcjhUIWC3442I1CW7');"></div>
                    Google Account
                </button>
</div>
</div>
<!-- Footer Help -->
<p class="mt-8 text-center text-slate-500 text-sm">
            New here? <a class="text-primary font-semibold" href="#">Join 10k+ marketers today.</a>
</p>
</div>
<!-- Visual Polish: Bottom Indicator -->
<div class="w-full flex justify-center pb-2 z-10">
<div class="w-32 h-1 bg-white/10 rounded-full"></div>
</div>
</body></html>
